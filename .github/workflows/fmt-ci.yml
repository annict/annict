name: Formatter CI

on:
  push:
    paths:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.mjs"
      - "**/*.css"
      - "**/*.scss"
      - "**/*.json"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.toml"
      - "**/*.md"
      - "**/*.html"
      - "**/*.graphql"

jobs:
  oxfmt:
    name: Oxfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run fmt:check
