name: Go CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

env:
  GO_VERSION: "1.26.2"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch the full history because the comment-check diff mode needs the merge-base with the base branch.
          # [Ja] コメント併記チェックの差分モードが基準ブランチとの merge-base を必要とするため全履歴を取得
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check templ generate
        run: |
          make templ-generate
          git diff --exit-code internal/templates/

      - name: Check goimports
        run: |
          make goimports-check

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.11.4
          working-directory: go
          args: --config=.golangci.yml ./...

      # Bilingual comment check ([Ja] marker misuse).
      # Whole tree: scan the entire tree for the misuse where [Ja] sits on a line with no Japanese.
      #
      # [Ja] コメントの英日併記チェック ([Ja] マーカーの誤用)
      # 全体: [Ja] が日本語を含まない行に付く誤用をツリー全体で検査
      - name: Check bilingual comments (whole tree)
        run: go tool koryluslint comment

      # PR only: check marker placement (missing English block / duplicate markers), limited to added lines.
      # [Ja] PR のみ: マーカー配置 (英語ブロックの欠落・マーカー重複) を追加行に限定して検査
      - name: Check bilingual comments (added lines)
        if: github.event_name == 'pull_request'
        run: go tool koryluslint comment -base=origin/${{ github.base_ref }}

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    env:
      APP_ENV: test
      DATABASE_URL: postgres://postgres@localhost:5432/annict_test?sslmode=disable
      ANNICT_REDIS_URL: redis://localhost:16379/1
      ANNICT_PORT: "4004"
      ANNICT_DOMAIN: "test.example.com"
      ANNICT_COOKIE_DOMAIN: ".test.example.com"
      ANNICT_SESSION_SECURE: "false"
      ANNICT_SESSION_HTTPONLY: "true"
      ANNICT_S3_BUCKET_NAME: "annict-test"
      ANNICT_IMGPROXY_ENDPOINT: "http://localhost:8080"
      ANNICT_IMGPROXY_KEY: "test_key"
      ANNICT_IMGPROXY_SALT: "test_salt"
      ANNICT_RAILS_APP_URL: "http://localhost:3000"
      ANNICT_DISABLE_RATE_LIMIT: "false"
      ANNICT_RESEND_FROM_EMAIL: "test@example.com"

    services:
      postgresql:
        image: postgres:17.5
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: annict_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.2.3-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get dependencies
        run: |
          go mod download

      - name: Setup test database
        run: |
          make db-setup-test

      - name: Run tests
        env:
          CI: true
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          make build

      - name: Check binary exists
        run: |
          if [ ! -f bin/annict ]; then
            echo "Build failed: binary not found"
            exit 1
          fi
