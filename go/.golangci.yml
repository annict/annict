# golangci-lint v2 の設定ファイル
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # タイムアウト（デフォルト: 1m）
  timeout: 5m
  # テストファイルを含める
  tests: true
  # ビルドタグ
  build-tags: []

linters:
  # 有効化するリンター
  enable:
    - govet # Go標準静的解析
    - staticcheck # 高度な静的解析
    - gosec # セキュリティチェック
    - depguard # 依存関係のルール強制
    - errcheck # エラーチェック漏れ
    - ineffassign # 無駄な代入
    - unused # 未使用コード

  # リンター除外ルール（v2形式）
  exclusions:
    rules:
      # テストファイルでは gosec と depguard を無効化
      - path: "(.+)_test\\.go"
        linters:
          - gosec
          - depguard
      # commentlint is a dev-only lint tool that reads scanned files via dynamic paths, so gosec is disabled for it.
      # [Ja] commentlint は開発用のリントツールで、走査対象ファイルを動的なパスで読むため gosec を無効化
      - path: "cmd/commentlint/.*"
        linters:
          - gosec
      # templ 自動生成ファイルは一部のリンターから除外（depguard は有効化）
      - path: "(.+)_templ\\.go"
        linters:
          - govet
          - staticcheck
          - gosec
          - errcheck
          - ineffassign
          - unused
      # シード関連ファイルはすべてのリンターから除外（開発/テスト用ユーティリティのため）
      - path: "internal/usecase/seed/.+\\.go"
        linters:
          - govet
          - staticcheck
          - gosec
          - depguard
          - errcheck
          - ineffassign
          - unused
      - path: "cmd/seed/.+\\.go"
        linters:
          - govet
          - staticcheck
          - gosec
          - depguard
          - errcheck
          - ineffassign
          - unused
      - path: "internal/seed/.+\\.go"
        linters:
          - govet
          - staticcheck
          - gosec
          - depguard
          - errcheck
          - ineffassign
          - unused
    # 除外するディレクトリ
    paths:
      - bin/.*
      - vendor/.*
      - static/.*
      - node_modules/.*

  # リンター固有の設定（v2形式）
  settings:
    # gosec の設定
    gosec:
      # 除外する脆弱性ルール（必要に応じて調整）
      excludes: []
      # セキュリティの重要度（low, medium, high）
      severity: medium
      confidence: medium

    # depguard の設定
    depguard:
      rules:
        # Templates層のルール: ViewModelを通じてデータを表示
        # 直接のデータアクセスとビジネスロジックに依存しない
        templates-layer:
          files:
            - "**/internal/templates/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "TemplatesはQueryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "TemplatesはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/model
              desc: "TemplatesはModelに直接依存できません。ViewModelを経由してください。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "TemplatesはUseCaseに依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "TemplatesはHandlerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "TemplatesはMiddlewareに依存できません。"

        # ViewModel層のルール: データ変換のみ
        # 他のPresentation層パッケージに依存しない
        viewmodel-layer:
          files:
            - "**/internal/viewmodel/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "ViewModelはQueryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "ViewModelはRepositoryに依存できません。ModelからViewModelへの変換を行ってください。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "ViewModelはHandlerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "ViewModelはMiddlewareに依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "ViewModelはTemplatesに依存できません。"

        # Handler層のルール: HTTPリクエスト処理
        # データアクセスはUseCase経由で行い、Repository・Validator・Queryに直接依存しない
        handler-layer:
          files:
            - "**/internal/handler/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "HandlerはQueryに直接依存できません。UseCase経由でアクセスしてください。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "HandlerはRepositoryに直接依存できません。UseCase経由でアクセスしてください。"
            - pkg: github.com/annict/annict/go/internal/validator
              desc: "HandlerはApplication層のValidatorに直接依存できません。UseCase経由でアクセスしてください。"

        # Validator層のルール（Application層）: UseCase から呼び出されるバリデーション
        # Presentation層とQuery、UseCaseへの依存を禁止
        validator-layer:
          files:
            - "**/internal/validator/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "ValidatorはQueryに直接依存できません。Repositoryを経由してください。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "ValidatorはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "ValidatorはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "ValidatorはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "ValidatorはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "ValidatorはUseCaseに依存できません。"

        # Dispatcher層のルール（Domain/Infrastructure層）: ジョブキューへの投入
        # Presentation層とApplication層、Queryへの依存を禁止
        dispatcher-layer:
          files:
            - "**/internal/dispatcher/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "DispatcherはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/validator
              desc: "DispatcherはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/worker
              desc: "DispatcherはWorkerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "DispatcherはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "DispatcherはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "DispatcherはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "DispatcherはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/query
              desc: "DispatcherはQueryに直接依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "DispatcherはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/model
              desc: "DispatcherはModelに依存できません。"

        # Middleware層のルール
        # エラーページ・メンテナンスページ等のレンダリングのためTemplatesへの依存は許可
        middleware-layer:
          files:
            - "**/internal/middleware/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "MiddlewareはQueryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "MiddlewareはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "MiddlewareはUseCaseに依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "MiddlewareはHandlerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "MiddlewareはViewModelに依存できません。"

        # Application層のルール（UseCase）
        # Presentation層に依存しない
        application-layer:
          files:
            - "**/internal/usecase/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "Application層はQueryに直接依存できません。Repositoryを経由してください。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "Application層はPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "Application層はPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "Application層はPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "Application層はPresentation層に依存できません。テンプレートレンダリングはemailパッケージを使用してください。"
            - pkg: github.com/annict/annict/go/internal/worker
              desc: "Application層はWorker（Presentation層）に依存できません。Dispatcher経由でジョブを投入してください。"
            - pkg: github.com/annict/annict/go/internal/session
              desc: "Application層はPresentation層のヘルパーに依存できません。トークン生成はauthパッケージを使用してください。"

        # Email層のルール: メール送信とテンプレートレンダリング
        # 上位層（Handler, UseCase, Worker等）に依存しない
        email-layer:
          files:
            - "**/internal/email/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "emailパッケージはQueryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "emailパッケージはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "emailパッケージはHandlerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "emailパッケージはMiddlewareに依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "emailパッケージはViewModelに依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "emailパッケージはUseCaseに依存できません。"
            - pkg: github.com/annict/annict/go/internal/validator
              desc: "emailパッケージはValidatorに依存できません。"
            - pkg: github.com/annict/annict/go/internal/worker
              desc: "emailパッケージはWorkerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/dispatcher
              desc: "emailパッケージはDispatcherに依存できません。"
            - pkg: github.com/annict/annict/go/internal/session
              desc: "emailパッケージはSessionに依存できません。"

        # Model層のルール: 純粋なドメインエンティティ
        # データアクセス層、上位層に依存しない
        model-layer:
          files:
            - "**/internal/model/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "ModelはQueryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "ModelはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "ModelはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "ModelはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "ModelはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "ModelはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "ModelはPresentation層に依存できません。"

        # RateLimit層のルール: インフラストラクチャユーティリティ
        # Queryに直接依存せず、Repositoryを経由する
        ratelimit-layer:
          files:
            - "**/internal/ratelimit/*.go"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "RateLimitはQueryに直接依存できません。Repositoryを経由してください。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "RateLimitはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "RateLimitはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "RateLimitはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "RateLimitはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "RateLimitはPresentation層に依存できません。"

        # Auth層のルール: Domain/Infrastructure層の横断的な技術ユーティリティ
        # authパッケージは認証に必要な低レベル処理（パスワードハッシュ化、CSRFトークン生成、
        # セキュアトークン生成、検証コード生成、パスワード強度検証）を提供する。
        # プロジェクト内部パッケージへの依存を禁止し、標準ライブラリおよび外部ライブラリ
        # （golang.org/x/crypto/bcrypt, crypto/rand など）のみに依存できる。
        # i18nへの依存禁止は、ValidatePasswordStrengthをsentinel error方式に変更した
        # 4-1の方針（エラー種別はsentinel errorで返し、翻訳は呼び出し元で解決する）を
        # 将来の退行から守るためのルール。
        auth-layer:
          files:
            - "**/internal/auth/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "authは横断的な技術ユーティリティのため、Queryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "authは横断的な技術ユーティリティのため、Repositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/model
              desc: "authは横断的な技術ユーティリティのため、Modelに依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "authは横断的な技術ユーティリティのため、UseCase(Application層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/validator
              desc: "authは横断的な技術ユーティリティのため、Validator(Application層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "authは横断的な技術ユーティリティのため、Handler(Presentation層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "authは横断的な技術ユーティリティのため、Middleware(Presentation層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "authは横断的な技術ユーティリティのため、ViewModel(Presentation層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "authは横断的な技術ユーティリティのため、Templates(Presentation層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/worker
              desc: "authは横断的な技術ユーティリティのため、Worker(Presentation層)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/session
              desc: "authは横断的な技術ユーティリティのため、Session(Presentation層ヘルパー)に依存できません。"
            - pkg: github.com/annict/annict/go/internal/i18n
              desc: "authはi18nに依存できません。エラー種別はsentinel errorで返し、翻訳は呼び出し元で解決してください(4-1の方針)。"
            - pkg: github.com/annict/annict/go/internal/dispatcher
              desc: "authは横断的な技術ユーティリティのため、Dispatcherに依存できません。"
            - pkg: github.com/annict/annict/go/internal/email
              desc: "authは横断的な技術ユーティリティのため、emailパッケージに依存できません。"
            - pkg: github.com/annict/annict/go/internal/turnstile
              desc: "authは横断的な技術ユーティリティのため、turnstileに依存できません。"
            - pkg: github.com/annict/annict/go/internal/ratelimit
              desc: "authは横断的な技術ユーティリティのため、ratelimitに依存できません。"

        # Repository層のルール: データアクセス層
        # 上位層に依存しない
        repository-layer:
          files:
            - "**/internal/repository/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "RepositoryはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "RepositoryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "RepositoryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "RepositoryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "RepositoryはPresentation層に依存できません。"

        # Worker層のルール: Presentation層の薄いAdapter
        # UseCase経由でのみビジネスロジックにアクセスする
        worker-layer:
          files:
            - "**/internal/worker/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/query
              desc: "WorkerはQueryに直接依存できません。UseCase経由でアクセスしてください。"
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "WorkerはRepositoryに直接依存できません。UseCase経由でアクセスしてください。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "WorkerはHandlerに依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "WorkerはMiddlewareに依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "WorkerはViewModelに依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "WorkerはPresentation層に依存できません。テンプレートレンダリングはemailパッケージを使用してください。"

        # Query層のルール: sqlc生成コード
        # 上位層に依存しない
        query-layer:
          files:
            - "**/internal/query/**"
          deny:
            - pkg: github.com/annict/annict/go/internal/repository
              desc: "QueryはRepositoryに依存できません。"
            - pkg: github.com/annict/annict/go/internal/model
              desc: "QueryはModelに依存できません。"
            - pkg: github.com/annict/annict/go/internal/usecase
              desc: "QueryはApplication層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/handler
              desc: "QueryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/middleware
              desc: "QueryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/viewmodel
              desc: "QueryはPresentation層に依存できません。"
            - pkg: github.com/annict/annict/go/internal/templates
              desc: "QueryはPresentation層に依存できません。"

    # staticcheck の設定
    staticcheck:
      # 有効化するチェック（デフォルトですべて有効）
      checks: ["all", "-ST1003"] # ST1003: パッケージ名のアンダースコア警告を除外（ディレクトリ構造に由来）

# フォーマッター固有の設定（v2形式）
formatters:
  # 有効化するフォーマッター
  enable:
    - gofmt # Go標準フォーマッター
    - goimports # import文の整理

  # フォーマッター除外パス
  exclusions:
    paths:
      - bin/.*
      - vendor/.*
      - static/.*
      - node_modules/.*
      - "(.+)_templ\\.go" # templ 自動生成ファイル

  settings:
    # goimports の設定
    goimports:
      # ローカルパッケージのプレフィックス
      local-prefixes:
        - github.com/annict/annict/go

# 出力設定（v2形式）
output:
  formats:
    text:
      path: stdout
      colors: true
